<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The System - Solo Leveling Real Life</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --system-blue: #00f0ff;
            --system-dark: #050b14;
            --system-card: #0d1b2a;
            --system-glow: rgba(0, 240, 255, 0.3);
            --system-text: #e0f7fa;
        }

        body {
            background-color: var(--system-dark);
            color: var(--system-text);
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
            background-image: radial-gradient(circle at center, #0a192f 0%, #050b14 100%);
        }

        .system-container {
            max-width: 800px;
            margin: 0 auto;
            border: 2px solid var(--system-blue);
            box-shadow: 0 0 20px var(--system-glow);
            background: rgba(13, 27, 42, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 8px;
            padding: 25px;
        }

        .system-header {
            text-align: center;
            border-bottom: 2px solid var(--system-blue);
            padding-bottom: 15px;
            margin-bottom: 25px;
            position: relative;
        }

        .system-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            color: var(--system-blue);
            text-shadow: 0 0 10px var(--system-blue);
            margin: 0;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .system-subtitle {
            font-size: 1rem;
            color: #88c0d0;
            letter-spacing: 2px;
            margin-top: 5px;
        }

        .status-panel {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .status-card {
            background: rgba(5, 11, 20, 0.6);
            border-left: 4px solid var(--system-blue);
            padding: 15px;
            border-radius: 0 8px 8px 0;
        }

        .stat-line {
            font-size: 1.3rem;
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
        }

        .stat-label {
            color: #8830d0;
            font-weight: bold;
            color: var(--system-blue);
        }

        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
        }

        .rank-badge {
            font-size: 2.5rem;
            font-family: 'Orbitron', sans-serif;
            color: #ff0055;
            text-shadow: 0 0 15px rgba(255, 0, 85, 0.6);
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .exp-container {
            margin: 25px 0;
        }

        .exp-bar-bg {
            width: 100%;
            background: #102a43;
            height: 24px;
            border-radius: 12px;
            border: 1px solid var(--system-blue);
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .exp-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #00f0ff, #0077ff);
            width: 0%;
            transition: width 0.4s ease;
            box-shadow: 0 0 10px var(--system-blue);
        }

        .exp-text {
            position: absolute;
            width: 100%;
            text-align: center;
            top: 2px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 1px 1px 3px #000;
        }

        .tabs {
            display: flex;
            gap: 10px;
            border-bottom: 1px solid rgba(0, 240, 255, 0.3);
            margin-bottom: 20px;
        }

        .tab-btn {
            background: none;
            border: none;
            color: #6272a4;
            padding: 10px 20px;
            font-size: 1.2rem;
            font-family: 'Rajdhani', sans-serif;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .tab-btn.active {
            color: var(--system-blue);
            border-bottom: 3px solid var(--system-blue);
            text-shadow: 0 0 5px var(--system-glow);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .quest-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .quest-item {
            background: rgba(5, 11, 20, 0.5);
            border: 1px solid rgba(0, 240, 255, 0.1);
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
        }

        .quest-item:hover {
            border-color: var(--system-blue);
            background: rgba(0, 240, 255, 0.05);
        }

        .quest-details {
            flex-grow: 1;
        }

        .quest-title {
            font-size: 1.3rem;
            font-weight: bold;
            color: #fff;
        }

        .quest-reward {
            font-size: 0.9rem;
            color: #50fa7b;
        }

        .quest-btn {
            background: transparent;
            border: 1px solid var(--system-blue);
            color: var(--system-blue);
            padding: 8px 16px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.3s;
        }

        .quest-btn:hover {
            background: var(--system-blue);
            color: var(--system-dark);
            box-shadow: 0 0 10px var(--system-blue);
        }

        .custom-quest-form {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .custom-quest-form input {
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(0, 240, 255, 0.4);
            color: #fff;
            padding: 10px;
            border-radius: 4px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.1rem;
        }

        .custom-quest-form input[type="text"] { flex-grow: 2; }
        .custom-quest-form input[type="number"] { flex-grow: 1; }

        .week-selector {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        select {
            background: var(--system-card);
            color: var(--system-blue);
            border: 1px solid var(--system-blue);
            padding: 8px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.1rem;
            border-radius: 4px;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--system-card);
            border: 2px solid #50fa7b;
            color: #50fa7b;
            padding: 15px 25px;
            border-radius: 5px;
            box-shadow: 0 0 15px rgba(80, 250, 123, 0.4);
            font-family: 'Orbitron', sans-serif;
            z-index: 1000;
            display: none;
            animation: fadeInOut 4s forwards;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(-20px); }
            10% { opacity: 1; transform: translateY(0); }
            90% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-20px); }
        }
    </style>
</head>
<body>

    <div class="notification" id="system-notification">QUEST COMPLETED!</div>

    <div class="system-container">
        <!-- HEADER -->
        <div class="system-header">
            <h1 class="system-title">Status Window</h1>
            <div class="system-subtitle">Real-Time Hunter Development System</div>
        </div>

        <!-- STATUS PANEL -->
        <div class="status-panel">
            <div class="status-card">
                <div class="stat-line">
                    <span class="stat-label">Hunter Name:</span>
                    <span class="stat-value" style="color: #fff;">Player</span>
                </div>
                <div class="stat-line">
                    <span class="stat-label">Level:</span>
                    <span class="stat-value" id="player-level">1</span>
                </div>
                <div class="stat-line">
                    <span class="stat-label">Title:</span>
                    <span class="stat-value" id="player-title" style="color: #ffb86c;">None</span>
                </div>
            </div>
            <div class="status-card rank-badge">
                <div style="font-size: 0.9rem; color: #88c0d0; font-family: 'Rajdhani'; letter-spacing: 2px;">CURRENT RANK</div>
                <span id="player-rank">E</span>
            </div>
        </div>

        <!-- EXP BAR -->
        <div class="exp-container">
            <div style="display:flex; justify-content:space-between; margin-bottom: 5px; font-weight: bold;">
                <span>EXP Progression</span>
                <span id="exp-ratio">0 / 100</span>
            </div>
            <div class="exp-bar-bg">
                <div class="exp-bar-fill" id="exp-fill"></div>
                <div class="exp-text" id="exp-percent">0%</div>
            </div>
        </div>

        <!-- TABS -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('daily')">Daily Quests</button>
            <button class="tab-btn" onclick="switchTab('custom')">Create Custom Quest</button>
        </div>

        <!-- DAILY QUESTS TAB -->
        <div id="daily-tab" class="tab-content active">
            <div class="week-selector">
                <label for="week-select" style="font-size: 1.2rem; font-weight: bold;">Select Training Level:</label>
                <select id="week-select" onchange="loadDailyQuests()">
                    <option value="1">Week 1 Routine (Beginner)</option>
                    <option value="2">Week 2 Routine (Intermediate)</option>
                    <option value="3">Week 3 Routine (Advanced)</option>
                    <option value="4">Week 4 Routine (Hunter Peak)</option>
                    <option value="final">Final Goal Routine (S-Rank Challenge)</option>
                </select>
            </div>
            <ul class="quest-list" id="daily-quest-list">
                <!-- Quests load dynamically -->
            </ul>
        </div>

        <!-- CUSTOM QUESTS TAB -->
        <div id="custom-tab" class="tab-content">
            <h3 style="color: var(--system-blue);">Add Real-Time Custom Goals</h3>
            <p>Apne real-life tasks ko add karein aur unhe complete karke EXP gain karein.</p>
            <div class="custom-quest-form">
                <input type="text" id="custom-title" placeholder="Quest Title (e.g., Coding for 2 hours, Reading books)">
                <input type="number" id="custom-exp" placeholder="EXP Reward" min="10" max="500">
                <button class="quest-btn" onclick="addCustomQuest()">Add Quest</button>
            </div>
            <br>
            <ul class="quest-list" id="custom-quest-list">
                <!-- Custom Quests load dynamically -->
            </ul>
        </div>

    </div>

    <script>
        // System Data State
        let state = {
            level: 1,
            exp: 0,
            nextLevelExp: 100,
            rank: 'E',
            title: 'None',
            customQuests: []
        };

        // Audio System Generator (No external files needed)
        function playSystemSound(type) {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);

            if (type === 'complete') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(587.33, ctx.currentTime); // D5
                osc.frequency.setValueAtTime(880, ctx.currentTime + 0.1); // A5
                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                osc.start();
                osc.stop(ctx.currentTime + 0.25);
            } else if (type === 'levelup') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(523.25, ctx.currentTime); // C5
                osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.1); // E5
                osc.frequency.setValueAtTime(783.99, ctx.currentTime + 0.2); // G5
                osc.frequency.setValueAtTime(1046.50, ctx.currentTime + 0.3); // C6
                gain.gain.setValueAtTime(0.15, ctx.currentTime);
                osc.start();
                osc.stop(ctx.currentTime + 0.5);
            }
        }

        // Load data from LocalStorage
        function loadState() {
            const saved = localStorage.getItem('solo_leveling_state');
            if (saved) {
                state = JSON.parse(saved);
                // Ensure array exists
                if (!state.customQuests) state.customQuests = [];
            }
            updateUI();
        }

        // Save data to LocalStorage
        function saveState() {
            localStorage.setItem('solo_leveling_state', JSON.stringify(state));
        }

        // Update Interface
        function updateUI() {
            document.getElementById('player-level').innerText = state.level;
            document.getElementById('player-rank').innerText = state.rank;
            document.getElementById('player-title').innerText = state.title;
            document.getElementById('exp-ratio').innerText = `${state.exp} / ${state.nextLevelExp}`;
            
            const pct = Math.min((state.exp / state.nextLevelExp) * 100, 100);
            document.getElementById('exp-fill').style.width = `${pct}%`;
            document.getElementById('exp-percent').innerText = `${Math.round(pct)}%`;
        }

        // Tab Switching
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            if (tab === 'daily') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('daily-tab').classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('custom-tab').classList.add('active');
            }
        }

        // Reward and Level Up Calculations
        function gainExp(amount) {
            state.exp += amount;
            playSystemSound('complete');
            showNotification(`+${amount} EXP GAINED`);

            while (state.exp >= state.nextLevelExp) {
                state.exp -= state.nextLevelExp;
                state.level++;
                state.nextLevelExp = Math.round(state.nextLevelExp * 1.5);
                playSystemSound('levelup');
                showNotification(`LEVEL UP! YOU ARE NOW LVL ${state.level}`, true);
            }

            // Rank Update System based on Levels
            if (state.level >= 45) { state.rank = 'S'; state.title = 'Shadow Monarch'; }
            else if (state.level >= 30) { state.rank = 'A'; state.title = 'High-Rank Hunter'; }
            else if (state.level >= 20) { state.rank = 'B'; state.title = 'Dungeon Elite'; }
            else if (state.level >= 12) { state.rank = 'C'; state.title = 'Regular Raider'; }
            else if (state.level >= 5) { state.rank = 'D'; state.title = 'Awakened'; }
            else { state.rank = 'E'; state.title = 'None'; }

            saveState();
            updateUI();
        }

        function showNotification(text, isLevelUp = false) {
            const notif = document.getElementById('system-notification');
            notif.innerText = text;
            notif.style.borderColor = isLevelUp ? '#ff0055' : '#50fa7b';
            notif.style.color = isLevelUp ? '#ff0055' : '#50fa7b';
            notif.style.boxShadow = isLevelUp ? '0 0 15px rgba(255,0,85,0.4)' : '0 0 15px rgba(80,250,123,0.4)';
            notif.style.display = 'block';
            
            setTimeout(() => {
                notif.style.display = 'none';
            }, 3800);
        }

        // Load Routines Based on User Uploaded Screenshots
        const routines = {
            "1": [
                { title: "20 Push-ups, 20 Sit-ups, 20 Squats (1-2 Min Rest)", exp: 30 },
                { title: "2 KM Run / Cardiorespiratory training", exp: 35 },
                { title: "20 Mins Light Stretching & Yoga", exp: 20 }
            ],
            "2": [
                { title: "40 Push-ups, 40 Sit-ups, 40 Squats (2 Sets, 1-2 Min Rest)", exp: 50 },
                { title: "4 KM Run (Conditioning Phase)", exp: 55 },
                { title: "30 Mins Stretching & Yoga (Legs, Chest, Core focus)", exp: 30 }
            ],
            "3": [
                { title: "60 Push-ups, 60 Sit-ups, 60 Squats (3 Sets)", exp: 75 },
                { title: "60 KM Run (Endurance Building)", exp: 80 },
                { title: "30 Mins Intermediate Yoga & Deep Mobility", exp: 40 }
            ],
            "4": [
                { title: "100 Push-ups, 100 Sit-ups, 100 Squats (4 Sets)", exp: 120 },
                { title: "10 KM Run (Extreme Gate Simulation)", exp: 150 },
                { title: "30 Mins Deep Stretching & Recovery Yoga", exp: 60 }
            ],
            "final": [
                { title: "S-Rank Target: 100 Push-ups, 100 Sit-ups, 100 Squats (Non-stop / Single Set)", exp: 250 },
                { title: "S-Rank Target: 10 KM Aggressive Run under 50 Mins", exp: 300 },
                { title: "Full Body Active Overhaul Recovery Session", exp: 100 }
            ]
        };

        function loadDailyQuests() {
            const selectedWeek = document.getElementById('week-select').value;
            const questList = document.getElementById('daily-quest-list');
            questList.innerHTML = '';

            routines[selectedWeek].forEach(q => {
                const li = document.createElement('li');
                li.className = 'quest-item';
                li.innerHTML = `
                    <div class="quest-details">
                        <div class="quest-title">${q.title}</div>
                        <div class="quest-reward">Reward: +${q.exp} EXP</div>
                    </div>
                    <button class="quest-btn" onclick="gainExp(${q.exp})">Complete</button>
                `;
                questList.appendChild(li);
            });
        }

        // Custom Quest Handlers
        function addCustomQuest() {
            const titleInput = document.getElementById('custom-title');
            const expInput = document.getElementById('custom-exp');

            if (!titleInput.value.trim() || !expInput.value) {
                alert('Quest text aur EXP point fill karein!');
                return;
            }

            const newQuest = {
                id: Date.now(),
                title: titleInput.value,
                exp: parseInt(expInput.value)
            };

            state.customQuests.push(newQuest);
            saveState();
            renderCustomQuests();

            titleInput.value = '';
            expInput.value = '';
        }

        function removeCustomQuest(id, exp) {
            state.customQuests = state.customQuests.filter(q => q.id !== id);
            gainExp(exp);
            renderCustomQuests();
        }

        function renderCustomQuests() {
            const list = document.getElementById('custom-quest-list');
            list.innerHTML = '';

            state.customQuests.forEach(q => {
                const li = document.createElement('li');
                li.className = 'quest-item';
                li.innerHTML = `
                    <div class="quest-details">
                        <div class="quest-title">${q.title}</div>
                        <div class="quest-reward">Reward: +${q.exp} EXP</div>
                    </div>
                    <button class="quest-btn" onclick="removeCustomQuest(${q.id}, ${q.exp})">Complete</button>
                `;
                list.appendChild(li);
            });
        }

        // Initialize System
        window.onload = function() {
            loadState();
            loadDailyQuests();
            renderCustomQuests();
        }
    </script>
</body>
</html>
