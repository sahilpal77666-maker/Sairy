<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Color Game Demo</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#02072d;
color:#fff;
padding:15px;
}

.card{
background:#07134a;
border-radius:15px;
padding:15px;
margin-bottom:15px;
}

.logo{
text-align:center;
font-size:32px;
font-weight:bold;
margin-bottom:15px;
}

.timer{
text-align:center;
font-size:28px;
color:#00e5ff;
margin-bottom:15px;
}

.colors{
display:flex;
gap:10px;
margin-bottom:15px;
}

.colors button{
flex:1;
height:50px;
border:none;
border-radius:10px;
color:white;
font-size:18px;
}

.green{background:#1db954;}
.violet{background:#9c4dcc;}
.red{background:#e53935;}

.numbers{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
margin-bottom:15px;
}

.ball{
height:60px;
width:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
font-weight:bold;
margin:auto;
background:white;
color:black;
cursor:pointer;
}

.bigsmall{
display:flex;
overflow:hidden;
border-radius:15px;
margin-top:10px;
}

.bigsmall button{
flex:1;
height:55px;
border:none;
font-size:22px;
color:white;
}

.big{
background:#d89238;
}

.small{
background:#5b8fd5;
}

.result{
text-align:center;
font-size:28px;
margin-top:15px;
color:#00ff9d;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th{
background:#2557c7;
padding:10px;
}

td{
padding:10px;
text-align:center;
border-bottom:1px solid #1d2e74;
}
</style>
</head>

<body>

<div class="logo">Demo Color Game</div>

<div class="card">

<div class="timer">
<span id="timer">30</span>s
</div>

<div class="colors">
<button class="green">Green</button>
<button class="violet">Violet</button>
<button class="red">Red</button>
</div>

<div class="numbers" id="numbers"></div>

<div class="bigsmall">
<button class="big">Big</button>
<button class="small">Small</button>
</div>

<div class="result" id="result">
Waiting...
</div>

</div>

<div class="card">

<h3>Game History</h3>

<table>

<thead>
<tr>
<th>Number</th>
<th>Size</th>
<th>Color</th>
</tr>
</thead>

<tbody id="history"></tbody>

</table>

</div>

<script>

const numbers=document.getElementById("numbers");

for(let i=0;i<=9;i++){

let d=document.createElement("div");

d.className="ball";

d.innerHTML=i;

numbers.appendChild(d);

}

let time=30;

let history=[];

setInterval(()=>{

time--;

document.getElementById("timer").innerHTML=time;

if(time<=0){

time=30;

generateResult();

}

},1000);

function generateResult(){

let num=Math.floor(Math.random()*10);

let size=num>=5?"Big":"Small";

let color="";

if([1,3,7,9].includes(num))
color="Green";

else if([2,4,6,8].includes(num))
color="Red";

else
color="Violet";

document.getElementById("result").innerHTML=
`Result : ${num} (${color})`;

history.unshift({
num,size,color
});

renderHistory();

}

function renderHistory(){

let html="";

history.slice(0,10).forEach(item=>{

html+=`
<tr>
<td>${item.num}</td>
<td>${item.size}</td>
<td>${item.color}</td>
</tr>
`;

});

document.getElementById("history").innerHTML=html;

}

</script>

</body>
</html>

<h2>Coins: <span id="coins">1000</span></h2>

<button onclick="addCoins()">+100 Coins</button>

<script>
let coins = localStorage.getItem("coins");

if (coins === null) {
    coins = 1000;
} else {
    coins = parseInt(coins);
}

updateCoins();

function updateCoins() {
    document.getElementById("coins").innerText = coins;
    localStorage.setItem("coins", coins);
}

function selectColor(color) {
    coins -= 10;

    if (coins < 0) {
        coins = 0;
        alert("Coins khatam ho gaye!");
    }

    updateCoins();
}

function addCoins() {
    coins += 100;
    updateCoins();
}
</script>
